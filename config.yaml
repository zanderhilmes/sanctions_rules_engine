api_key: "${ANTHROPIC_API_KEY}"

llm:
  model: "claude-haiku-4-5-20251001"
  escalation_model: "claude-sonnet-4-6"
  strong_model_score_threshold: 70.0
  max_tokens: 512

rules:
  auto_clear_confidence_threshold: 0.65
  escalate_hard_weight: 0.90
  clear_hard_weight: 0.90
  low_score_clear_threshold: 30.0
  common_names_file: "data/common_names.txt"
  age_improbability_max_years: 5
  # DOB mismatch at high match scores routes to LLM rather than auto-clearing
  dob_mismatch_high_score_threshold: 80.0

snowflake:
  enabled: true
  account: "${SNOWFLAKE_ACCOUNT}"      # e.g. xy12345.us-east-1
  user: "${SNOWFLAKE_USER}"
  warehouse: "${SNOWFLAKE_WAREHOUSE}"
  database: "APP_CASH"
  schema_name: "HEALTH"
  table: "IDENTITY_IDV_ATTEMPTS"
  # Authentication — choose one:
  #   username/password:   authenticator: snowflake  + SNOWFLAKE_PASSWORD
  #   Okta SSO:            authenticator: https://your-org.okta.com  + SNOWFLAKE_PASSWORD
  #   OAuth token:         authenticator: oauth  + SNOWFLAKE_TOKEN
  #   Browser (manual):    authenticator: externalbrowser  (interactive only)
  authenticator: "externalbrowser"
  # For headless/automated use, try: "https://login.block.xyz"
  password: "${SNOWFLAKE_PASSWORD}"
  token: "${SNOWFLAKE_TOKEN}"
  # DOB history — primary customer DOB source (backs CASH_W_DOB)
  dob_history_table: "APP_CASH.HEALTH.IDENTITY_DOB_HISTORY"
  # Customer summary — BIRTH_YEAR fallback when DOB history is absent
  customer_summary_table: "APP_CASH.APP.CUSTOMER_SUMMARY"
  # Account creation date — used by age improbability rule when customer_dob is absent
  account_table: "APP_CASH.APP.CASH_CUSTOMER_IDENTITY_W_AFTERPAY"
  account_id_col: "CUSTOMER_TOKEN"
  account_created_col: "CUSTOMER_CREATED_AT"

# TLOxp — fills customer_dob and customer_state from public records
# Activate once credentials are provisioned:
#   1. Set TLOXP_API_KEY and TLOXP_API_URL in .env
#   2. Fill in _SEARCH_ENDPOINT and _parse_response() in tlo_client.py
#   3. Set enabled: true below
tlo:
  enabled: false
  api_key: "${TLOXP_API_KEY}"
  api_url: "${TLOXP_API_URL}"

# NOTE: Option 1 (preferred) — fix ERF_DOB in Bridger export settings so that
# the SDN DOB is populated directly in the Bridger CSV.  Disable this enricher
# (enabled: false) once Bridger populates ERF_DOB.
ofac:
  enabled: true
  cache_path: "data/sdn_advanced.xml"
  max_age_hours: 24

output:
  csv_path: "output/audit_trail.csv"
  json_path: "output/audit_trail.json"
